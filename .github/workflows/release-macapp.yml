name: Release macOS app

on:
  push:
    branches: [main, test, dev]
    # Only rebuild + publish when something that affects the .app changes.
    paths:
      - 'macapp/**'
      - '.github/workflows/release-macapp.yml'
  workflow_dispatch:

permissions:
  contents: write   # required to create/update GitHub Releases

concurrency:
  # Per-branch group so a dev push doesn't queue behind a main push.
  group: release-macapp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build & publish .app
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version
          swift --version

      - name: Build .app bundle
        working-directory: macapp
        run: ./build.sh

      - name: Compute release metadata
        id: meta
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SHORT_SHA="$(git rev-parse --short HEAD)"

          case "$BRANCH" in
            main)
              VERSION="0.0.${GITHUB_RUN_NUMBER}"
              TAG="v${VERSION}"
              NAME="Calendar Availability ${VERSION}"
              ZIP_NAME="Calendar-Availability-${VERSION}.zip"
              PRERELEASE="false"
              MAKE_LATEST="true"
              ROLLING="false"
              ;;
            test)
              VERSION="test-${SHORT_SHA}"
              TAG="test-build"
              NAME="Test build — test @ ${SHORT_SHA}"
              ZIP_NAME="Calendar-Availability-test-${SHORT_SHA}.zip"
              PRERELEASE="true"
              MAKE_LATEST="false"
              ROLLING="true"
              ;;
            dev)
              VERSION="dev-${SHORT_SHA}"
              TAG="dev-build"
              NAME="Development build — dev @ ${SHORT_SHA}"
              ZIP_NAME="Calendar-Availability-dev-${SHORT_SHA}.zip"
              PRERELEASE="true"
              MAKE_LATEST="false"
              ROLLING="true"
              ;;
            *)
              echo "Unknown branch: $BRANCH — refusing to publish" >&2
              exit 1
              ;;
          esac

          {
            echo "branch=${BRANCH}"
            echo "version=${VERSION}"
            echo "short_sha=${SHORT_SHA}"
            echo "tag=${TAG}"
            echo "name=${NAME}"
            echo "zip_name=${ZIP_NAME}"
            echo "prerelease=${PRERELEASE}"
            echo "make_latest=${MAKE_LATEST}"
            echo "rolling=${ROLLING}"
          } >> "$GITHUB_OUTPUT"

      - name: Zip .app (preserve bundle structure)
        working-directory: macapp/build
        run: |
          /usr/bin/ditto -c -k --keepParent \
            "Calendar Availability.app" \
            "${{ steps.meta.outputs.zip_name }}"
          ls -lh "${{ steps.meta.outputs.zip_name }}"

      - name: Clear existing rolling release (dev / test only)
        if: steps.meta.outputs.rolling == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the previous rolling release + tag if it exists. The
          # `|| true` guard handles the very first run when nothing is
          # there to delete yet.
          gh release delete "${{ steps.meta.outputs.tag }}" \
            --yes --cleanup-tag \
            --repo "${{ github.repository }}" || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          fail_on_unmatched_files: true
          files: macapp/build/${{ steps.meta.outputs.zip_name }}
          body: |
            **Branch:** `${{ steps.meta.outputs.branch }}`
            **Commit:** `${{ steps.meta.outputs.short_sha }}`
            **Workflow run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ## Install

            1. Download **${{ steps.meta.outputs.zip_name }}** below.
            2. Unzip it and move **Calendar Availability.app** into `/Applications`.
            3. Open Terminal and run:

               ```sh
               xattr -dr com.apple.quarantine "/Applications/Calendar Availability.app"
               ```

               This step is required. Without it, macOS refuses to launch the app and reports that it cannot verify whether the software contains malware. The app is ad-hoc signed but not notarized with an Apple Developer ID, so macOS treats downloads of it as unverified by default.
            4. Launch **Calendar Availability** from Finder, Spotlight, or Launchpad. On first launch macOS asks for Calendar access — required to read event start and end times. Event titles, attendees, notes, and locations are never read.

            ## Requirements

            macOS 26 (Tahoe) or later.
