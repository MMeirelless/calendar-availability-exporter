name: Release macOS app

on:
  push:
    branches: [main]
    # Only rebuild + publish when something that affects the .app changes.
    paths:
      - 'macapp/**'
      - '.github/workflows/release-macapp.yml'
  workflow_dispatch:

permissions:
  contents: write   # required to create/update GitHub Releases

concurrency:
  group: release-macapp
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build & publish .app
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version
          swift --version

      - name: Build .app bundle
        working-directory: macapp
        run: ./build.sh

      - name: Compute version / tag
        id: meta
        run: |
          VERSION="0.0.${GITHUB_RUN_NUMBER}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          TAG="v${VERSION}"
          ZIP_NAME="Calendar-Availability-${VERSION}.zip"
          {
            echo "version=${VERSION}"
            echo "short_sha=${SHORT_SHA}"
            echo "tag=${TAG}"
            echo "zip_name=${ZIP_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Zip .app (preserve bundle structure)
        working-directory: macapp/build
        run: |
          /usr/bin/ditto -c -k --keepParent \
            "Calendar Availability.app" \
            "${{ steps.meta.outputs.zip_name }}"
          ls -lh "${{ steps.meta.outputs.zip_name }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "Calendar Availability ${{ steps.meta.outputs.version }}"
          target_commitish: ${{ github.sha }}
          make_latest: 'true'
          fail_on_unmatched_files: true
          files: macapp/build/${{ steps.meta.outputs.zip_name }}
          body: |
            Automated build from `main` @ `${{ steps.meta.outputs.short_sha }}`.

            ## Install

            1. Download **${{ steps.meta.outputs.zip_name }}** below.
            2. Unzip and drag **Calendar Availability.app** into `/Applications`.
            3. First launch: **right-click → Open**, then confirm. This is required because the app is ad-hoc signed (not notarized with an Apple Developer ID), so Gatekeeper asks for explicit consent the first time.

            Alternatively, strip the quarantine attribute and launch normally:

            ```sh
            xattr -dr com.apple.quarantine "/Applications/Calendar Availability.app"
            ```

            On first launch, macOS will ask for Calendar access — required to read event times. Titles, attendees, notes, and locations are never read.

            ## Requirements

            macOS 26 (Tahoe) or later. Older versions don't have the Liquid Glass APIs the UI relies on.
